name: 'Deploy Laravel Blue-Green'
description: 'Deploy a Laravel application using Blue-Green strategy via SSH (Caddy, Docker, Supervisor)'

branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  # ─── SSH connection ───
  ssh_host:
    description: 'SSH host'
    required: true
  ssh_user:
    description: 'SSH user'
    required: true
  ssh_key:
    description: 'SSH private key'
    required: true
  ssh_port:
    description: 'SSH port'
    required: false
    default: '22'

  # ─── Docker Registry ───
  registry:
    description: 'Container registry (e.g. ghcr.io)'
    required: false
    default: 'ghcr.io'
  registry_username:
    description: 'Registry username'
    required: true
  registry_password:
    description: 'Registry password or token'
    required: true
  image_name:
    description: 'Full Docker image name with tag (e.g. ghcr.io/owner/repo:latest)'
    required: true

  # ─── Repository with configs ───
  repo_ssh_url:
    description: 'Git SSH URL of the repository that contains Makefile, docker-compose.prod.yml, .env.example'
    required: true
  deploy_branch:
    description: 'Branch from which to take configs'
    required: false
    default: 'deploy'

  # ─── Paths ───
  base_dir:
    description: 'Base directory on the server'
    required: false
    default: '/www'
  health_path:
    description: 'Health check endpoint'
    required: false
    default: '/health'

  # ─── Secrets for .env ───
  db_host:
    description: 'Database host'
    required: false
  db_port:
    description: 'Database port'
    required: false
  db_username:
    description: 'Database username'
    required: false
  db_password:
    description: 'Database password'
    required: false
  redis_host:
    description: 'Redis host'
    required: false
  redis_port:
    description: 'Redis port'
    required: false
  redis_password:
    description: 'Redis password'
    required: false

  # ─── Key generation ───
  generate_app_key:
    description: 'Automatically generate APP_KEY and JWT_SECRET'
    required: false
    default: 'true'
  app_key_prefix:
    description: 'Add base64: prefix to APP_KEY'
    required: false
    default: 'true'
  app_env:
    description: 'Environment (local, production, develop)'
    required: false
    default: 'production'
  app_debug:
    description: 'Debugging'
    required: false
    default: 'false'
  # ─── Logging ───
  log_channel:
    description: 'Logging type'
    required: false
    default: 'stack'
  log_level:
    description: 'Logging level'
    required: false
    default: 'error'
  # ─── Horizon auth ───
  horizon_admin_user:
    description: 'Horizon admin user'
    required: false
    default: 'horizon'
  horizon_admin_password:
    description: 'Horizon admin password'
    required: false
    default: 'horizon'
  # ─── Telescope auth ───
  telescope_admin_user:
    description: 'Telescope admin user'
    required: false
    default: 'telescope'
  telescope_admin_password:
    description: 'Telescope admin password'
    required: false
    default: 'telescope'

runs:
  using: 'composite'
  steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ inputs.ssh_host }}
        username: ${{ inputs.ssh_user }}
        key: ${{ inputs.ssh_key }}
        port: ${{ inputs.ssh_port }}
        script_stop: true
        script: |
          set -euo pipefail

          BASE_DIR="${{ inputs.base_dir }}"
          CADDY_CONFIG="$BASE_DIR/Caddyfile"
          CURRENT_SLOT_FILE="$BASE_DIR/.current_slot"
          IMAGE="${{ inputs.image_name }}"
          REPO_URL="${{ inputs.repo_ssh_url }}"
          BRANCH="${{ inputs.deploy_branch }}"
          HEALTH_PATH="${{ inputs.health_path }}"

          # Checking Dependencies
          command -v docker >/dev/null 2>&1 || { echo "ERROR: docker not found"; exit 1; }
          command -v make >/dev/null 2>&1 || { echo "ERROR: make not found"; exit 1; }
          command -v curl >/dev/null 2>&1 || { echo "ERROR: curl not found"; exit 1; }
          command -v git >/dev/null 2>&1 || { echo "ERROR: git not found"; exit 1; }

          # Docker Network
          docker network inspect app-network >/dev/null 2>&1 || docker network create app-network

          # Log in to the registry
          echo "${{ inputs.registry_password }}" | docker login "${{ inputs.registry }}" -u "${{ inputs.registry_username }}" --password-stdin

          TMP_DIR=$(mktemp -d)
          cleanup() { rm -rf "$TMP_DIR"; }
          trap cleanup EXIT

          git clone --branch "$BRANCH" "$REPO_URL" "$TMP_DIR"

          mkdir -p "$BASE_DIR"
          cp "$TMP_DIR/Makefile" "$BASE_DIR/Makefile"
          cp "$TMP_DIR/docker-compose.prod.yml" "$BASE_DIR/docker-compose.prod.yml"
          cp "$TMP_DIR/.env.example" "$BASE_DIR/.env.example"

          # Preparing the .env file for blue and green
          for SLOT in blue green; do
            mkdir -p "$BASE_DIR/$SLOT"
            cp "$BASE_DIR/.env.example" "$BASE_DIR/$SLOT/.env"

            # Key Generation
            if [ "${{ inputs.generate_app_key }}" = "true" ]; then
              if [ "${{ inputs.app_key_prefix }}" = "true" ]; then
                APP_KEY="base64:$(openssl rand -base64 32)"
              else
                APP_KEY="$(openssl rand -hex 32)"
              fi
              JWT_SECRET="$(openssl rand -hex 64)"
              sed -i "s|^APP_KEY=.*|APP_KEY=${APP_KEY}|" "$BASE_DIR/$SLOT/.env"
              sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${JWT_SECRET}|" "$BASE_DIR/$SLOT/.env"
            fi

            sed -i "s|^APP_ENV=.*|APP_ENV=${{ inputs.app_env }}|" "$BASE_DIR/$SLOT/.env"
            sed -i "s|^APP_DEBUG=.*|APP_DEBUG=${{ inputs.app_debug }}|" "$BASE_DIR/$SLOT/.env"
            sed -i "s|^LOG_CHANNEL=.*|LOG_CHANNEL=${{ inputs.log_channel }}|" "$BASE_DIR/$SLOT/.env"
            sed -i "s|^LOG_LEVEL=.*|LOG_LEVEL=${{ inputs.log_level }}|" "$BASE_DIR/$SLOT/.env"

            sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=pgsql|" "$BASE_DIR/$SLOT/.env"
            [ -n "${{ inputs.db_host }}" ] && sed -i "s|^DB_HOST=.*|DB_HOST=${{ inputs.db_host }}|" "$BASE_DIR/$SLOT/.env"
            [ -n "${{ inputs.db_port }}" ] && sed -i "s|^DB_PORT=.*|DB_PORT=${{ inputs.db_port }}|" "$BASE_DIR/$SLOT/.env"
            sed -i "s|^DB_DATABASE=.*|DB_DATABASE=app_${SLOT}|" "$BASE_DIR/$SLOT/.env"
            [ -n "${{ inputs.db_username }}" ] && sed -i "s|^DB_USERNAME=.*|DB_USERNAME=${{ inputs.db_username }}|" "$BASE_DIR/$SLOT/.env"
            [ -n "${{ inputs.db_password }}" ] && sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${{ inputs.db_password }}|" "$BASE_DIR/$SLOT/.env"

            [ -n "${{ inputs.redis_host }}" ] && sed -i "s|^REDIS_HOST=.*|REDIS_HOST=${{ inputs.redis_host }}|" "$BASE_DIR/$SLOT/.env"
            [ -n "${{ inputs.redis_port }}" ] && sed -i "s|^REDIS_PORT=.*|REDIS_PORT=${{ inputs.redis_port }}|" "$BASE_DIR/$SLOT/.env"
            [ -n "${{ inputs.redis_password }}" ] && sed -i "s|^REDIS_PASSWORD=.*|REDIS_PASSWORD=${{ inputs.redis_password }}|" "$BASE_DIR/$SLOT/.env"

            sed -i "s|^HORIZON_ADMIN_USER=.*|HORIZON_ADMIN_USER=${{ inputs.horizon_admin_user }}|" "$BASE_DIR/$SLOT/.env"
            sed -i "s|^HORIZON_ADMIN_PASSWORD=.*|HORIZON_ADMIN_PASSWORD=${{ inputs.horizon_admin_password }}|" "$BASE_DIR/$SLOT/.env"
            sed -i "s|^TELESCOPE_ADMIN_USER=.*|TELESCOPE_ADMIN_USER=${{ inputs.telescope_admin_user }}|" "$BASE_DIR/$SLOT/.env"
            sed -i "s|^TELESCOPE_ADMIN_PASSWORD=.*|TELESCOPE_ADMIN_PASSWORD=${{ inputs.telescope_admin_password }}|" "$BASE_DIR/$SLOT/.env"
          done

          if [ ! -f "$CURRENT_SLOT_FILE" ]; then
            echo blue > "$CURRENT_SLOT_FILE"
          fi

          CURRENT_SLOT="$(cat "$CURRENT_SLOT_FILE")"
          if [ "$CURRENT_SLOT" = "blue" ]; then
            NEW_SLOT="green"
            NEW_PORT="8082"
          else
            NEW_SLOT="blue"
            NEW_PORT="8081"
          fi

          export IMAGE="$IMAGE"
          export ENV="$NEW_SLOT"
          export PORT="$NEW_PORT"

          cd "$BASE_DIR"

          echo "Deploying to $NEW_SLOT on port $NEW_PORT"
          make "deploy-$NEW_SLOT"

          echo "Waiting for health check..."
          for i in $(seq 1 10); do
            if curl -fsS "http://localhost:${NEW_PORT}${HEALTH_PATH}" >/dev/null; then
              echo "Health OK"
              break
            fi
            sleep 5
          done

          if ! curl -fsS "http://localhost:${NEW_PORT}${HEALTH_PATH}" >/dev/null; then
            echo "Health check failed, rollback to $CURRENT_SLOT"
            make "switch-to-$CURRENT_SLOT" || true
            exit 1
          fi

          if ! make "switch-to-$NEW_SLOT"; then
            echo "Switch failed, rollback to $CURRENT_SLOT"
            make "switch-to-$CURRENT_SLOT" || true
            exit 1
          fi

          echo "$NEW_SLOT" > "$CURRENT_SLOT_FILE"

          make down ENV="$CURRENT_SLOT" || true
          echo "Deployment complete. Active: $NEW_SLOT"