name: 'Deploy Laravel Blue-Green'
description: 'Deploy a Laravel application using Blue-Green strategy via SSH (Caddy, Docker, Supervisor)'

branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  # ─── SSH connection ───
  ssh_host:
    description: 'SSH host'
    required: true
  ssh_user:
    description: 'SSH user'
    required: true
  ssh_key:
    description: 'SSH private key'
    required: true
  ssh_port:
    description: 'SSH port'
    required: false
    default: '22'

  # ─── Docker Registry ───
  registry:
    description: 'Container registry (e.g. ghcr.io)'
    required: false
    default: 'ghcr.io'
  registry_username:
    description: 'Registry username'
    required: true
  registry_password:
    description: 'Registry password or token'
    required: true
  image_name:
    description: 'Full Docker image name with tag (e.g. ghcr.io/owner/repo:latest)'
    required: true

  # ─── Repository with configs ───
  repo_ssh_url:
    description: 'Git SSH URL of the repository that contains Makefile, docker-compose.prod.yml, .env.example'
    required: true
  deploy_branch:
    description: 'Branch from which to take configs'
    required: false
    default: 'deploy'

  # ─── Paths ───
  base_dir:
    description: 'Base directory on the server'
    required: false
    default: '/www'
  health_path:
    description: 'Health check endpoint (e.g. /health)'
    required: false
    default: '/health'

  # ─── Secrets for .env ───
  db_host:
    description: 'Database host'
    required: false
  db_port:
    description: 'Database port'
    required: false
  db_username:
    description: 'Database username'
    required: false
  db_password:
    description: 'Database password'
    required: false
  redis_host:
    description: 'Redis host'
    required: false
  redis_port:
    description: 'Redis port'
    required: false
  redis_password:
    description: 'Redis password'
    required: false

  # ─── Key generation ───
  generate_app_key:
    description: 'Automatically generate APP_KEY (base64:…) and JWT_SECRET (hex)'
    required: false
    default: 'true'
  app_key_prefix:
    description: 'Add "base64:" prefix to APP_KEY (set false to use plain hex string)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ inputs.ssh_host }}
        username: ${{ inputs.ssh_user }}
        key: ${{ inputs.ssh_key }}
        port: ${{ inputs.ssh_port }}
        script_stop: true
        script: |
          #!/bin/bash
          set -e
          set -x

          BASE_DIR="${{ inputs.base_dir }}"
          CADDY_CONFIG="$BASE_DIR/Caddyfile"
          IMAGE="${{ inputs.image_name }}"
          REPO_URL="${{ inputs.repo_ssh_url }}"
          BRANCH="${{ inputs.deploy_branch }}"
          HEALTH_PATH="${{ inputs.health_path }}"

          # Проверка зависимостей
          command -v docker >/dev/null 2>&1 || { echo "ERROR: docker not found"; exit 1; }
          command -v make >/dev/null 2>&1 || { echo "ERROR: make not found"; exit 1; }
          command -v curl >/dev/null 2>&1 || { echo "ERROR: curl not found"; exit 1; }
          command -v git >/dev/null 2>&1 || { echo "ERROR: git not found"; exit 1; }

          # Сеть Docker
          docker network inspect app-network >/dev/null 2>&1 || docker network create app-network

          # Логин в регистри
          echo "${{ inputs.registry_password }}" | docker login ${{ inputs.registry }} -u ${{ inputs.registry_username }} --password-stdin

          # Клонируем репозиторий с конфигами
          TMP_DIR=$(mktemp -d)
          git clone --branch "$BRANCH" "$REPO_URL" "$TMP_DIR"

          mkdir -p "$BASE_DIR"
          cp "$TMP_DIR/Makefile" "$BASE_DIR/Makefile"
          cp "$TMP_DIR/docker-compose.prod.yml" "$BASE_DIR/docker-compose.prod.yml"
          cp "$TMP_DIR/.env.example" "$BASE_DIR/.env.example"

          # Подготовка .env для blue и green
          for ENV_NAME in blue green; do
            ENV_FILE="$BASE_DIR/$ENV_NAME/.env"
            mkdir -p "$BASE_DIR/$ENV_NAME"
            cp "$BASE_DIR/.env.example" "$ENV_FILE"

            # Генерация ключей
            if [ "${{ inputs.generate_app_key }}" = "true" ]; then
              if [ "${{ inputs.app_key_prefix }}" = "true" ]; then
                NEW_KEY="base64:$(openssl rand -base64 32)"
              else
                NEW_KEY="$(openssl rand -hex 32)"
              fi
              sed -i "s|^APP_KEY=.*|APP_KEY=${NEW_KEY}|" "$ENV_FILE"

              JWT_SECRET="$(openssl rand -hex 64)"
              sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${JWT_SECRET}|" "$ENV_FILE"
            fi

            # Подстановка переменных окружения
            sed -i "s/DB_CONNECTION=.*/DB_CONNECTION=pgsql/" "$ENV_FILE"
            [ -n "${{ inputs.db_host }}" ] && sed -i "s/DB_HOST=.*/DB_HOST=${{ inputs.db_host }}/" "$ENV_FILE"
            [ -n "${{ inputs.db_port }}" ] && sed -i "s/DB_PORT=.*/DB_PORT=${{ inputs.db_port }}/" "$ENV_FILE"
            sed -i "s/DB_DATABASE=.*/DB_DATABASE=app_${ENV_NAME}/" "$ENV_FILE"
            [ -n "${{ inputs.db_username }}" ] && sed -i "s/DB_USERNAME=.*/DB_USERNAME=${{ inputs.db_username }}/" "$ENV_FILE"
            if [ -n "${{ inputs.db_password }}" ]; then
              DB_PASSWORD_ESC=$(echo "${{ inputs.db_password }}" | sed 's/[\/&]/\\&/g')
              sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=$DB_PASSWORD_ESC/" "$ENV_FILE"
            fi
            [ -n "${{ inputs.redis_host }}" ] && sed -i "s/REDIS_HOST=.*/REDIS_HOST=${{ inputs.redis_host }}/" "$ENV_FILE"
            [ -n "${{ inputs.redis_port }}" ] && sed -i "s/REDIS_PORT=.*/REDIS_PORT=${{ inputs.redis_port }}/" "$ENV_FILE"
            if [ -n "${{ inputs.redis_password }}" ]; then
              REDIS_PASSWORD_ESC=$(echo "${{ inputs.redis_password }}" | sed 's/[\/&]/\\&/g')
              sed -i "s/REDIS_PASSWORD=.*/REDIS_PASSWORD=$REDIS_PASSWORD_ESC/" "$ENV_FILE"
            fi
          done

          # Симлинк конфигурации Caddy (если нужно)
          CADDY_SYSTEM_CONFIG="/etc/caddy/Caddyfile"
          if [ ! -L "$CADDY_SYSTEM_CONFIG" ] || [ "$(readlink "$CADDY_SYSTEM_CONFIG")" != "$CADDY_CONFIG" ]; then
            sudo ln -sf "$CADDY_CONFIG" "$CADDY_SYSTEM_CONFIG"
            sudo systemctl restart caddy || true
          fi

          # Определение активного и нового окружения
          if grep -q "localhost:8081" "$CADDY_CONFIG" 2>/dev/null; then
            ACTIVE="blue"
            ACTIVE_PORT="8081"
          elif grep -q "localhost:8082" "$CADDY_CONFIG" 2>/dev/null; then
            ACTIVE="green"
            ACTIVE_PORT="8082"
          else
            ACTIVE="blue"
            ACTIVE_PORT="8081"
          fi

          [ "$ACTIVE" = "blue" ] && { NEW="green"; NEW_PORT="8082"; } || { NEW="blue"; NEW_PORT="8081"; }
          echo "Active: $ACTIVE (port $ACTIVE_PORT), New: $NEW (port $NEW_PORT)"

          cd "$BASE_DIR"

          export ENV="$NEW"
          export PORT="$NEW_PORT"
          export IMAGE="$IMAGE"

          # Загружаем .env нового окружения в shell
          set -a
          source "$BASE_DIR/$NEW/.env"
          set +a

          # Деплой через Makefile
          make deploy

          # Health check
          echo "Checking health of $NEW..."
          for i in {1..10}; do
            if curl -f -s -o /dev/null -w "%{http_code}" "http://localhost:${NEW_PORT}${HEALTH_PATH}" | grep -q '200'; then
              echo "Health OK"
              break
            fi
            sleep 5
          done

          # Переключение трафика
          make switch-to-"$NEW"
          sudo caddy reload --config "$CADDY_CONFIG" || sudo systemctl restart caddy || true

          # Остановка старого окружения
          make down ENV="$ACTIVE" || true

          rm -rf "$TMP_DIR"
          echo "Deployment complete. Active: $NEW"